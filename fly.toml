# fly.toml app configuration file generated for quadra-app on 2025-08-12T23:14:40-06:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'quadra-app'
primary_region = 'qro'

[build]
  dockerfile = 'Dockerfile'

[deploy]
  release_command = "python -c 'from app import create_app, db; app = create_app(); app.app_context().push(); db.create_all()'"

[env]
  PORT = '8080'
  PYTHONPATH = '/app'

[[mounts]]
  source = 'quadra_storage'
  destination = '/app/app/static/uploads'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[services]]
  protocol = 'tcp'
  internal_port = 8080
  processes = ['app']

  [[services.ports]]
    port = 80
    handlers = ['http']
    force_https = true

  [[services.ports]]
    port = 443
    handlers = ['tls', 'http']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
